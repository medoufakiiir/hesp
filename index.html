    <style>
        :root {

            overflow-x: hidden;
            background: var(--cream);
        }
        body.dark { background: var(--steel); }

        /* Grain overlay */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.025; pointer-events: none; z-index: 9998;
        }

        .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }

        /* Custom cursor */
        body { cursor: none; }
        #cursor {
            width: 12px; height: 12px;
            background: var(--orange);
            border-radius: 50%;
            position: fixed; top: 0; left: 0;
            pointer-events: none; z-index: 99999;
            transition: transform 0.15s ease, width 0.2s, height 0.2s;
            transform: translate(-50%, -50%);
        }
        #cursor-ring {
            width: 36px; height: 36px;
            border: 1.5px solid var(--orange);
            border-radius: 50%;
            position: fixed; top: 0; left: 0;
            pointer-events: none; z-index: 99998;
            transition: transform 0.4s ease, opacity 0.2s;
            transform: translate(-50%, -50%);
            opacity: 0.5;
        }
        a:hover ~ #cursor, button:hover ~ #cursor { transform: translate(-50%,-50%) scale(2.5); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--cream); }
        ::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 2px; }
        body.dark ::-webkit-scrollbar-track { background: var(--steel); }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Marquee */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .marquee { display: flex; width: fit-content; animation: marquee 35s linear infinite; }

        /* Counter animation */
        @keyframes countUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        .count-up { animation: countUp 0.8s ease forwards; }

        /* Line reveal */
        @keyframes lineGrow { from { width: 0; } to { width: 100%; } }

        /* Hover lift */
        .lift { transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease; }
        .lift:hover { transform: translateY(-6px); box-shadow: 0 24px 48px rgba(0,0,0,0.12); }

        /* Orange glow */
        .glow-orange { box-shadow: 0 0 40px rgba(232,83,10,0.25); }

        /* Section divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(232,83,10,0.4), transparent);
        }

        /* Text stroke */
        .stroke-text {
            -webkit-text-stroke: 2px var(--orange);
            color: transparent;
        }

        /* Parallax hero image */
        .hero-img {
            transition: transform 0.1s linear;
        }

        /* Stats number */
        .stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 6vw, 5rem);
            color: var(--orange);
            line-height: 1;
        }

        /* Card hover border animation */
        .card-border {
            position: relative;
            overflow: hidden;
        }
        .card-border::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 3px;
            background: var(--orange);
            transition: width 0.4s ease;
        }
        .card-border:hover::after { width: 100%; }

        /* Pill tag */
        .pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 16px;
            border-radius: 999px;
            border: 1px solid rgba(232,83,10,0.3);
            background: rgba(232,83,10,0.06);
            color: var(--orange);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* Input focus glow */
        .input-field {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 18px 24px;
            width: 100%;
            color: white;
            font-family: 'Barlow', sans-serif;
            font-size: 15px;
            font-weight: 600;
            outline: none;

        }
        .input-field::placeholder { color: rgba(255,255,255,0.35); }
        .input-field:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(232,83,10,0.15); }

        /* Mobile menu */
        @keyframes slideDown { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
        .menu-open { animation: slideDown 0.25s ease forwards; }

        /* Tabs underline */
        .tab-active { color: var(--orange); border-bottom: 2px solid var(--orange); }

        /* Hero diagonal cut */
        .hero-cut {
            clip-path: polygon(0 0, 100% 0, 100% 88%, 0 100%);
        }

        /* Dark mode adjustments */
        body.dark .bg-cream { background: #111 !important; }
        body.dark .text-brown { color: #fff !important; }

        /* Smooth image load */
        img { transition: opacity 0.3s; }

        /* Stagger children */
        .stagger > * { opacity: 0; animation: countUp 0.6s ease forwards; }
        .stagger > *:nth-child(1) { animation-delay: 0.05s; }
        .stagger > *:nth-child(2) { animation-delay: 0.15s; }

        .stagger > *:nth-child(4) { animation-delay: 0.35s; }
        .stagger > *:nth-child(5) { animation-delay: 0.45s; }
        .stagger > *:nth-child(6) { animation-delay: 0.55s; }

        // Custom cursor
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx+'px'; cursor.style.top = my+'px'; });
        function animRing() { rx += (mx-rx)*0.12; ry += (my-ry)*0.12; ring.style.left = rx+'px'; ring.style.top = ry+'px'; requestAnimationFrame(animRing); }
        animRing();
        document.querySelectorAll('a,button').forEach(el => {
            el.addEventListener('mouseenter', () => { cursor.style.transform='translate(-50%,-50%) scale(2.5)'; ring.style.opacity='0'; });
            el.addEventListener('mouseleave', () => { cursor.style.transform='translate(-50%,-50%) scale(1)'; ring.style.opacity='0.5'; });
        });
    </script>

                                                    <div className="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center">
                                                        <SolidBrandIcon name={app.icon || "cog"} size={24} />
                                                    </div>
                                                    <div>
                                                        <h4 className="font-display text-4xl tracking-wide mb-3">{app.title}</h4>
                                                        <p className="text-white/60 text-sm leading-relaxed max-w-xs">{app.desc}</p>
                                                    </div>
                                                </div>
                                            </motion.div>
                                        ))}
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>
                    </section>

                    {/* ════════════════════════════════
                        WHY RIYADA
                    ════════════════════════════════ */}
                    <section id="why" className="py-32 lg:py-44 bg-[#2c1810] text-white relative overflow-hidden">
                        {/* Decorative */}
                        <div className="absolute top-0 right-0 w-96 h-96 rounded-full bg-[#e8530a]/10 blur-3xl pointer-events-none" />
                        <div className="absolute bottom-0 left-0 w-64 h-64 rounded-full bg-[#e8530a]/5 blur-3xl pointer-events-none" />

                        <div className="max-w-7xl mx-auto px-6 relative z-10">
                            <div className="grid lg:grid-cols-12 gap-16">
                                {/* Left */}
                                <div className="lg:col-span-4 space-y-10">
                                    <div>
                                        <div className="pill mb-6">{t.nav.why}</div>
                                        <h2 className="font-display text-[clamp(3.5rem,6vw,5.5rem)] leading-none">{t.why.title}</h2>
                                    </div>
                                    <p className="text-white/50 text-lg leading-relaxed">{t.why.sub}</p>

                                    {/* Lead times card */}
                                    <div className="bg-[#e8530a] rounded-2xl p-8 space-y-5">
                                        <div className="text-[10px] font-bold uppercase tracking-[0.25em] text-[#2c1810]">Lead Time Standards</div>
                                        {t.why.times.map((item,i) => (
                                            <div key={i} className="flex justify-between items-center border-b border-black/10 pb-4 last:border-0 last:pb-0">
                                                <span className="text-sm font-semibold text-[#2c1810]">{item.label}</span>
                                                <span className="font-display text-xl tracking-wide text-[#2c1810]">{item.val}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Right – cards */}
                                <div className="lg:col-span-8 grid sm:grid-cols-2 gap-5">
                                    {t.why.items.map((item,i) => (
                                        <motion.div key={i}
                                            initial={{opacity:0,y:24}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{delay:i*0.1,duration:0.6}}
                                            className="group p-10 bg-white/5 border border-white/10 rounded-3xl hover:bg-[#e8530a] hover:border-[#e8530a] transition-all duration-500 lift"
                                        >
                                            <div className="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center mb-8 group-hover:bg-white transition-colors">
                                                <Icon name={item.icon} size={22} className="text-white group-hover:text-[#e8530a] transition-colors" />
                                            </div>
                                            <h3 className="font-display text-3xl tracking-wide mb-4">{item.title}</h3>
                                            <p className="text-white/40 group-hover:text-white/80 text-sm leading-relaxed transition-colors">{item.desc}</p>
                                        </motion.div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ════════════════════════════════
                        INDUSTRIES
                    ════════════════════════════════ */}
                    <section id="industries" className={`py-32 lg:py-44 ${isDark ? 'bg-[#0d0d0d]' : 'bg-white'}`}>
                        <div className="max-w-7xl mx-auto px-6">
                            <motion.div initial="hidden" whileInView="visible" viewport={{once:true}} variants={stagger} className="text-center mb-20">
                                <motion.div variants={fadeUp} className="flex justify-center mb-6">
                                    <div className="pill">{t.nav.industries}</div>
                                </motion.div>
                                <motion.h2 variants={fadeUp} className={`font-display text-[clamp(3rem,7vw,6rem)] leading-none ${isDark?'text-white':'text-[#2c1810]'}`}>
                                    {t.industries.title}
                                </motion.h2>
                            </motion.div>

                            <div className="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-5">
                                {t.industries.items.map((item,i) => (
                                    <motion.div key={i}
                                        initial={{opacity:0,y:30}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{delay:i*0.1,duration:0.6}}
                                        whileHover={{y:-8}}
                                        className={`group p-10 rounded-3xl border card-border lift cursor-default ${isDark ? 'bg-white/5 border-white/10' : 'bg-stone-50 border-stone-200'}`}
                                    >
                                        <div className="w-14 h-14 rounded-2xl bg-[#e8530a]/10 flex items-center justify-center mb-8 group-hover:bg-[#e8530a] transition-colors">
                                            <Icon name={item.icon} size={26} className="text-[#e8530a] group-hover:text-white transition-colors" />
                                        </div>
                                        <h3 className={`font-display text-2xl tracking-wide mb-3 ${isDark?'text-white':'text-[#2c1810]'}`}>{item.name}</h3>
                                        <p className={`text-sm leading-relaxed ${isDark?'text-white/40':'text-stone-500'}`}>{item.desc}</p>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ════════════════════════════════
                        CONTACT
                    ════════════════════════════════ */}
                    <section id="contact" className={`py-32 lg:py-44 ${isDark ? 'bg-[#111]' : 'bg-[#f7f3ee]'}`}>
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="rounded-[3rem] bg-[#2c1810] overflow-hidden relative">
                                {/* Pattern overlay */}
                                <div className="absolute inset-0 opacity-10 pointer-events-none"
                                    style={{backgroundImage:"url('https://www.transparenttextures.com/patterns/carbon-fibre.png')"}} />
                                {/* Orange accent */}
                                <div className="absolute top-0 right-0 w-80 h-80 bg-[#e8530a]/15 rounded-full blur-3xl pointer-events-none" />
                                <div className="absolute bottom-0 left-0 w-60 h-60 bg-[#e8530a]/10 rounded-full blur-3xl pointer-events-none" />

                                <div className="relative z-10 grid lg:grid-cols-2">
                                    {/* Info */}
                                    <div className="p-12 lg:p-20 space-y-12 border-b lg:border-b-0 lg:border-r border-white/10">
                                        <div>
                                            <div className="pill mb-6">{t.nav.contact}</div>
                                            <h2 className="font-display text-[clamp(3rem,5vw,5rem)] leading-none text-white">{t.contact.title}</h2>
                                            <p className="text-white/40 mt-4 text-lg">{t.contact.sub}</p>
                                        </div>
                                        <div className="space-y-6">
                                            {[
                                                { icon:"phone", val:"+966 55 228 2868" },
                                                { icon:"mail", val:"info@riyada-ventures.com" },
                                                { icon:"map-pin", val:"Al Faisaliyyah, Riyadh 12882, Saudi Arabia" }
                                            ].map((c,i) => (
                                                <div key={i} className="group flex gap-5 items-start p-5 rounded-2xl hover:bg-white/5 transition-colors cursor-pointer">
                                                    <div className="w-12 h-12 rounded-xl bg-[#e8530a]/20 flex items-center justify-center flex-shrink-0 group-hover:bg-[#e8530a] transition-colors">
                                                        <Icon name={c.icon} size={20} className="text-[#e8530a] group-hover:text-white transition-colors" />
                                                    </div>
                                                    <p className="text-white/70 font-semibold leading-relaxed pt-2.5">{c.val}</p>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="text-[10px] font-bold uppercase tracking-[0.3em] text-white/30">{t.contact.hours}</div>
                                    </div>

                                    {/* Form */}
                                    <div className="p-12 lg:p-20">
                                        <form className="space-y-5" onSubmit={e=>e.preventDefault()}>
                                            <div className="grid sm:grid-cols-2 gap-4">
                                                <input type="text" placeholder={t.contact.name} className="input-field" />
                                                <input type="email" placeholder={t.contact.email} className="input-field" />
                                            </div>
                                            <input type="text" placeholder={t.contact.company} className="input-field" />
                                            <textarea placeholder={t.contact.message} rows="5" className="input-field resize-none" />
                                            <button type="submit"
                                                className="w-full flex items-center justify-center gap-3 bg-[#e8530a] text-white font-bold uppercase text-sm tracking-[0.2em] py-5 rounded-2xl hover:bg-[#c94309] transition-all hover:shadow-xl hover:shadow-orange-500/20 active:scale-[0.98]">
                                                {t.contact.send}
                                                <Icon name="send" size={16} />
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                                                        {/* ════════════════════════════════
                                                                Made by Mohamed Oufakir
                                                            ════════════════════════════════ */}
                    {/* ════════════════════════════════
                        FOOTER
                    ════════════════════════════════ */}
                    <footer className="bg-[#111] text-white pt-24 pb-10 border-t border-white/5">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-12 mb-16">
                                {/* Brand */}
                                <div className="lg:col-span-4 space-y-6">
                                    <img src="images/logo.png" alt="Riyada Ventures" style={{height:'70px',width:'auto'}} />
                                    <p className="text-white/40 text-sm leading-relaxed max-w-xs">{t.footer.tagline}</p>
                                    <div className="flex gap-3">
                                        {[
                                            { icon:'facebook', url:'https://www.facebook.com/profile.php?id=61585739796353' },
                                            { icon:'instagram', url:'https://www.instagram.com/rv_hesp/' }
                                        
                                        ].map(s => (
                                            <a key={s.icon} href={s.url} target="_blank" rel="noreferrer"
                                                className="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-white/40 hover:bg-[#e8530a] hover:border-[#e8530a] hover:text-white transition-all">
                                                {s.icon === 'facebook' ? (
                                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                                        <path d="M13.5 22v-9h3l.5-4h-3.5V7.5c0-1.1.3-1.8 1.9-1.8H17V2.1c-.4-.1-1.7-.2-3.1-.2-3 0-5 1.8-5 5.1V9H6v4h2.9v9h4.6Z" />
                                                    </svg>
                                                ) : s.icon === 'instagram' ? (
                                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                                        <path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm10 2H7a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3Zm-5 4.5A5.5 5.5 0 1 1 6.5 14A5.5 5.5 0 0 1 12 8.5Zm0 2A3.5 3.5 0 1 0 15.5 14A3.5 3.5 0 0 0 12 10.5ZM18 7.2a1 1 0 1 1-1 1 1 1 0 0 1 1-1Z" />
                                                    </svg>
                                                ) : (
                                                    <Icon name={s.icon} size={15} />
                                                )}
                                            </a>
                                        ))}
                                    </div>
                                </div>

                                {/* Links */}
                                <div className="lg:col-span-2 space-y-5">
                                    <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] text-[#e8530a]">{t.footer.links}</h4>
                                    <ul className="space-y-3">
                                        {Object.entries(t.nav).map(([key,label]) => (
                                            <li key={key}>
                                                <a href={`#${key}`} onClick={e=>{e.preventDefault();scrollTo(key)}}
                                                    className="text-sm text-white/40 hover:text-white hover:translate-x-1 transition-all inline-block font-semibold">
                                                    {label}
                                                </a>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Products */}
                                <div className="lg:col-span-2 space-y-5">
                                    <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] text-[#e8530a]">{t.footer.solutions}</h4>
                                    <ul className="space-y-3">
                                        {ProductData.map(p => (
                                            <li key={p.id}>
                                                <a href="#products" onClick={e=>{e.preventDefault();scrollTo('products')}}
                                                    className="text-sm text-white/40 hover:text-white hover:translate-x-1 transition-all inline-block font-semibold">
                                                    {p.name}
                                                </a>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Newsletter */}
                                <div className="lg:col-span-4 space-y-5">
                                    <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] text-[#e8530a]">{t.footer.newsletter}</h4>
                                    <p className="text-sm text-white/40">Stay updated with the latest in heavy machinery technology and parts sourcing.</p>
                                    <div className="flex bg-white/5 border border-white/10 rounded-xl p-1.5 focus-within:border-[#e8530a] transition-all">
                                        <input type="email" placeholder="Email address"
                                            className="bg-transparent flex-grow px-4 py-2 text-sm font-semibold text-white outline-none placeholder:text-white/30" />
                                        <button className="bg-[#e8530a] px-5 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest hover:bg-[#c94309] transition-all">
                                            {t.footer.subscribe}
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 pt-2">
                                        {[{n:'24/7',l:'Support Line'},{n:'100%',l:'Genuine Parts'}].map((s,i) => (
                                            <div key={i} className="p-4 bg-white/5 rounded-xl border border-white/5 text-center">
                                                <div className="font-display text-2xl text-[#e8530a]">{s.n}</div>
                                                <div className="text-[8px] uppercase font-bold text-white/30 tracking-widest mt-1">{s.l}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="pt-8 border-t border-white/5 flex flex-col sm:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-2 text-white/20">
                                    <div className="w-7 h-7 rounded-full bg-white/5 flex items-center justify-center">
                                        <Icon name="award" size={11} />
                                    </div>
                                    <span className="text-[10px] font-bold uppercase tracking-widest">Saudi Vision 2030</span>
                                </div>
                                <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-white/20">
                                    © {new Date().getFullYear()} {t.footer.rights}
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
